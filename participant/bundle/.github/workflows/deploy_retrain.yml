# =============================================================================
# deploy_retrain.yml — Deploy & Retrain on Merge to Main
# =============================================================================
# Triggers when a PR is merged to main.
# Steps:
#   1. Deploy the updated bundle to the prod workspace
#   2. Trigger the retrain job (ingest → train → gate → deploy)
#
# This workflow is what participants observe in Session 2 — the instructor
# demos this running on a projector while participants manually trigger
# the same retrain job in 02_trigger_retrain.ipynb.
#
# Required GitHub Secrets:
#   DATABRICKS_HOST  — workshop workspace URL
#   DATABRICKS_TOKEN — Service principal token (not a human PAT)

name: Deploy & Retrain

on:
  push:
    branches:
      - main
    paths:
      - "wheels/**"
      - "resources/**"
      - "databricks.yml"

  # Allow manual trigger from the Actions tab (for demos)
  workflow_dispatch:
    inputs:
      skip_retrain:
        description: "Skip the retrain job (deploy bundle only)"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy-and-retrain:
    name: Deploy Bundle → Run Retrain Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run unit tests (safety check before deploy)
        run: |
          pip install --quiet \
            scikit-learn>=1.3 \
            mlflow>=2.10 \
            pyyaml>=6.0 \
            pandas>=1.5 \
            numpy>=1.24 \
            pytest>=7.0
          pytest wheels/tests/ -v --tb=short
        env:
          PYTHONPATH: wheels

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target prod
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Deploy bundle to prod
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Run retrain job
        if: ${{ inputs.skip_retrain != 'true' }}
        run: |
          databricks bundle run workshop_retrain_churn --target prod
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
