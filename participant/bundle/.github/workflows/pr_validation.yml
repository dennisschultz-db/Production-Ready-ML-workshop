# =============================================================================
# pr_validation.yml — Pull Request Validation
# =============================================================================
# Triggers on every PR targeting the main branch.
# Blocks merging if:
#   - Any pytest test fails
#   - The Declarative Automation Bundle fails validation
#
# Required GitHub Secrets:
#   DATABRICKS_HOST  — e.g. https://fevm-dennis-schultz-classic01.cloud.databricks.com
#   DATABRICKS_TOKEN — Service principal PAT or OAuth token

name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "wheels/**"
      - "resources/**"
      - "databricks.yml"
      - ".github/workflows/**"

jobs:
  validate:
    name: Validate — Tests & Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --quiet \
            scikit-learn>=1.3 \
            mlflow>=2.10 \
            pyyaml>=6.0 \
            pandas>=1.5 \
            numpy>=1.24 \
            pytest>=7.0

      - name: Run unit tests
        run: |
          pytest wheels/tests/ -v --tb=short
        env:
          PYTHONPATH: wheels

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks Automation Bundle
        run: |
          databricks bundle validate --target dev
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
