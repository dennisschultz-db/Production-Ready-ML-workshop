# =============================================================================
# serving_endpoint.yml — Instructor Reference Serving Endpoint
# =============================================================================
# This resource is deployed ONLY in the prod target.
# It creates the instructor reference endpoint that participants compare
# against in Session 2 and that the retrain job updates via Task 4.
#
# IMPORTANT: Only deployed to prod target (not dev):
#   databricks bundle deploy --target prod
#
# Participants create their own endpoints interactively in
# src/session1/05_register_and_serve.ipynb — this is the instructor's copy.

resources:
  model_serving_endpoints:
    churn_instructor_reference:
      name: churn_instructor_reference
      description: >
        Instructor reference endpoint for the Telco churn model.
        Updated by the workshop_retrain_churn job when a new champion is registered.
        Participants can query this endpoint to compare against their own.

      config:
        served_models:
          - model_name: ${var.catalog}.00_shared.churn_classifier
            model_version: "1"
            workload_size: Small
            scale_to_zero_enabled: true
            name: champion

        traffic_config:
          routes:
            - served_model_name: champion
              traffic_percentage: 100

      # AI Gateway inference tables replace the deprecated auto_capture_config.
      # Logs every request/response payload to a Delta table for monitoring.
      ai_gateway:
        inference_table_config:
          catalog_name: ${var.catalog}
          schema_name: "00_shared"
          table_name_prefix: churn_instructor
          enabled: true

      tags:
        - key: workshop
          value: "true"
        - key: session
          value: "2"
