# =============================================================================
# training_job.yml — Session 1 Training Pipeline
# =============================================================================
# This job runs the three model types and selects the best one.
# Participants trigger it manually via the Databricks Jobs UI or SDK
# as a reference for "what the automated pipeline does".
#
# Deploy: databricks bundle deploy
# Run:    databricks bundle run workshop_training_churn

resources:
  jobs:
    workshop_training_churn:
      name: workshop_training_churn
      description: >
        Session 1 reference job — trains Logistic Regression, Random Forest,
        and Gradient Boosted Trees on the Telco churn dataset and logs all
        runs to MLflow. Used to demonstrate the transition from manual
        notebook execution to an automated pipeline.

      tags:
        workshop: "true"
        session: "1"
        user: ${workspace.current_user.userName}

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: experiment_name
          default: /Users/${workspace.current_user.userName}/churn_${var.schema}
        - name: config_path
          default: "/Workspace/Users/${workspace.current_user.userName}/Production-Ready-ML-workshop/participant/common/config.yml"

      tasks:
        # ---------------------------------------------------------------
        # Task 1: Train all model types, select best by F1
        # Passes best_run_id to downstream tasks via task values.
        # ---------------------------------------------------------------
        - task_key: train_all_models
          description: Train all three model types and pick the best by F1
          notebook_task:
            notebook_path: ../jobs/02_train_models.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema:  "{{job.parameters.schema}}"
              experiment_name: "{{job.parameters.experiment_name}}"
              config_path: "{{job.parameters.config_path}}"
          environment_key: ml_env

      environments:
        - environment_key: ml_env
          spec:
            client: "5"
            dependencies:
              - scikit-learn>=1.3
              - mlflow>=2.10
              - pyyaml>=6.0
              - databricks-sdk>=0.20

      email_notifications:
        on_failure:
          - "{{var.notification_email}}"
